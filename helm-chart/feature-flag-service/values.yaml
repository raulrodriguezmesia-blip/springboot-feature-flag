replicaCount: 1

image:
  repository: your-docker-registry/feature-flag-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:postgresql://postgres-service:5432/featureflags"
  - name: SPRING_REDIS_HOST
    value: "redis-service"
  - name: APP_JWTSECRET
    valueFrom:
      secretKeyRef:
        name: jwt-secret
        key: secret
