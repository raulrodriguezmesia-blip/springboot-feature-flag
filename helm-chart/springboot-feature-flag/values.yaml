image:
  repository: raulrodriguezmesia/springboot-feature-flag
  tag: latest

autoscaling:
  hpa:
    minReplicas: 2
    maxReplicas: 10
    cpuUtilization: 70
  vpa:
    minCpu: 200m
    maxCpu: 2000m
    updateMode: Auto

proactiveCorrections:
  enabled: true
  triggerRiskLevel: high
  extraValidations: [gpg, x509, sha256, sha512]

correctiveReportsDistribution:
  enabled: true
  audiences:
    CTO: technical
    CEO: executive
    Recruiters: bilingual

distributionTraceability:
  enabled: true
  trackOpen: true
  trackDownload: true
  archiveLogs: true

impactMetrics:
  enabled: true
  correlateCalendar: true
  correlateRecruitment: true

orchestration:
  enabled: true
  workflowEngine: argo
  backupProviders: [awsS3, azureBlob]
  autoScaling: true
