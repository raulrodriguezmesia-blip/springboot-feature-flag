# Default values for springboot-feature-flag
# This is a YAML-formatted file.

# Image configuration
image:
  repository: raulrodriguezmesia/springboot-feature-flag
  tag: latest
  pullPolicy: IfNotPresent

# Replica count for the deployment
replicaCount: 2

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  host: featureflags.example.com
  tls:
    enabled: true
    secretName: springboot-feature-flag-tls
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

# Resource configuration
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# ConfigMap configuration
config:
  enabled: true

# Secret configuration  
secret:
  enabled: true

# Node selector for scheduling
nodeSelector: {}

# Tolerations for tainted nodes
tolerations: []

# Affinity configuration
affinity: {}
