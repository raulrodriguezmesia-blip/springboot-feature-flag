# Default values for springboot-feature-flag
# This is a YAML-formatted file.

# Image configuration
image:
  repository: raulrodriguezmesia/springboot-feature-flag
  tag: latest
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  port: 8080
  namespace: production

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  host: featureflags.example.com
  tls:
    enabled: true
    secretName: springboot-feature-flag-tls
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod

# Cert-manager configuration
certManager:
  enabled: true
  clusterIssuer: letsencrypt-prod

# Observability configuration
observability:
  prometheus: true
  grafana: true
  loki: true

# Loki configuration
loki:
  enabled: true
  datasource: loki

# Alerts configuration
alerts:
  enabled: true
  severity: critical
  slack: true
  teams: false

# Autoscaling configuration (Hybrid HPA + VPA)
autoscaling:
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    requestsPerSecond: 100
    cpuUtilization: 70
    memoryUtilization: 80
  vpa:
    enabled: true
    minCpu: 200m
    minMemory: 256Mi
    maxCpu: 2000m
    maxMemory: 4Gi
    updateMode: Auto

# Resource configuration
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# ConfigMap configuration
config:
  enabled: true

# Secret configuration  
secret:
  enabled: true

# Node selector for scheduling
nodeSelector: {}

# Tolerations for tainted nodes
tolerations: []

# Affinity configuration
affinity: {}
