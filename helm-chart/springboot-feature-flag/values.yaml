image:
  repository: raulrodriguezmesia/springboot-feature-flag
  tag: latest

autoscaling:
  hpa:
    minReplicas: 2
    maxReplicas: 10
    cpuUtilization: 70
  vpa:
    minCpu: 200m
    maxCpu: 2000m
    updateMode: Auto

proactiveCorrections:
  enabled: true
  triggerRiskLevel: high
  extraValidations: [gpg, x509, sha256, sha512]

correctiveReportsDistribution:
  enabled: true
  audiences:
    CTO: technical
    CEO: executive
    Recruiters: bilingual

distributionTraceability:
  enabled: true
  trackOpen: true
  trackDownload: true
  archiveLogs: true
  notifySlack: true
  notifyTeams: true

impactAnalytics:
  enabled: true
  calendarIntegration: true
  correlateCEO: true
  correlateRecruiters: true
  dashboard: true
