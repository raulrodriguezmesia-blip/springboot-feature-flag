apiVersion: v1
kind: Secret
metadata:
  name: resilience-credentials
  namespace: reporting
type: Opaque
stringData:
  # SMTP credentials
  smtp_user: ""
  smtp_pass: ""
  smtp_server: "smtp.office365.com"
  smtp_port: "587"
  
  # Microsoft Graph API token
  graph_api_token: ""
  
  # Gmail API token
  gmail_api_token: ""
  
  # AWS credentials for S3 backup
  aws_access_key_id: ""
  aws_secret_access_key: ""
  aws_region: "us-east-1"
  
  # Azure credentials for Blob backup
  azure_storage_account: ""
  azure_storage_key: ""
  azure_storage_container: "resilience-reports"
  
  # GPG private key for signing
  gpg_private_key: ""
  
  # GPG passphrase
  gpg_passphrase: ""
  
  # X.509 certificate
  x509_cert: ""
  x509_key: ""
