apiVersion: v1
kind: Secret
metadata:
  name: {{ include "springboot-feature-flag.fullname" . }}-secret
  labels:
    {{- include "springboot-feature-flag.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database credentials - will be automatically base64 encoded when applied
  DB_USERNAME: "springuser"
  DB_PASSWORD: "springpass"
  # Add more secrets as needed
  # DB_HOST: "mysql.example.com"
  # DB_PORT: "3306"
