{{- if .Values.vpa.enabled }}
# Vertical Pod Autoscaler for springboot-feature-flag
# Automatically adjusts CPU and memory requests based on usage
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "springboot-feature-flag.fullname" . }}-vpa
  labels:
    {{- include "springboot-feature-flag.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "springboot-feature-flag.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode }}
  resourcePolicy:
    containerPolicies:
      - containerName: {{ .Chart.Name }}
        minAllowed:
          cpu: {{ .Values.vpa.minCpu }}
          memory: {{ .Values.vpa.minMemory }}
        maxAllowed:
          cpu: {{ .Values.vpa.maxCpu }}
          memory: {{ .Values.vpa.maxMemory }}
        controlledResources: ["cpu", "memory"]
{{- end }}
