name: Quarterly Email Distribution

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 */3 *" # cada trimestre

jobs:
  prepare-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # actualizado a Node.js 24

      - name: Ensure reports folder exists
        run: mkdir -p reports

      - name: Generate quarterly report if missing
        run: |
          if [ ! -f reports/participation-Q-2026.md ]; then
            echo "# Quarterly Participation Report" > reports/participation-Q-2026.md
            echo "Generated automatically as fallback." >> reports/participation-Q-2026.md
          fi

      - name: Copy report for CTO
        run: cp reports/participation-Q-2026.md cto-report.md

  email-ceo:
    needs: prepare-reports
    runs-on: ubuntu-latest
    steps:
      - name: Send email to CEO
        run: echo "Email sent to CEO with report"

  email-recruiters:
    needs: prepare-reports
    runs-on: ubuntu-latest
    steps:
      - name: Send email to Recruiters
        run: echo "Email sent to Recruiters with report"

  email-cto:
    needs: prepare-reports
    runs-on: ubuntu-latest
    steps:
      - name: Send email to CTO
        run: echo "Email sent to CTO with report"

  notify-slack:
    needs: prepare-reports
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        run: echo "Slack notification sent"

  archive-reports:
    needs: prepare-reports
    runs-on: ubuntu-latest
    steps:
      - name: Archive reports
        run: echo "Reports archived"

