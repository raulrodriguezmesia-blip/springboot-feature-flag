# CD - Spring Boot Feature Flag with Rollback
# Pipeline de despliegue continuo con rollback automático en Kubernetes
name: CD - Spring Boot Feature Flag with Rollback

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set version tags
        id: meta
        run: |
          IMAGE_NAME=raulrodriguezmesia/springboot-feature-flag
          COMMIT_SHA=${GITHUB_SHA::8}
          echo "image=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tag=${COMMIT_SHA}" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-kubernetes:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      - name: Set up Kubernetes config
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.13.0
      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install springboot-feature-flag ./helm-chart/springboot-feature-flag \
            --set image.repository=raulrodriguezmesia/springboot-feature-flag \
            --set image.tag=${{ github.sha }} \
            --namespace production \
            --create-namespace \
            --wait \
            --timeout 5m
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/springboot-feature-flag -n production --timeout=60s
        continue-on-error: true
        id: verify
      - name: Verify HPA (resource based)
        run: |
          kubectl get hpa springboot-feature-flag-hpa -n production -o yaml
          kubectl describe hpa springboot-feature-flag-hpa -n production
      - name: Verify HPA Custom (requests per second)
        run: |
          kubectl get hpa springboot-feature-flag-hpa-custom -n production -o yaml
          kubectl describe hpa springboot-feature-flag-hpa-custom -n production
      - name: Rollback on failure
        if: steps.verify.outcome == 'failure'
        run: |
          echo "Deployment failed, rolling back to previous revision..."
          helm rollback springboot-feature-flag 0 --namespace production
        continue-on-error: true
      - name: Health check
        run: |
          echo "Deployment completed - validate endpoint at https://${{ secrets.INGRESS_HOST }}/actuator/health"
