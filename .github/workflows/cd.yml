# CD - Spring Boot Feature Flag with Resilience Testing
# Pipeline de despliegue continuo con rollback, chaos tests y notificaciones
name: CD - Spring Boot Feature Flag with Rollback

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set version tags
        id: meta
        run: |
          IMAGE_NAME=raulrodriguezmesia/springboot-feature-flag
          COMMIT_SHA=${GITHUB_SHA::8}
          echo "image=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tag=${COMMIT_SHA}" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-kubernetes:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      - name: Set up Kubernetes config
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.13.0
      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install springboot-feature-flag ./helm-chart/springboot-feature-flag \
            --set image.repository=raulrodriguezmesia/springboot-feature-flag \
            --set image.tag=${{ github.sha }} \
            --namespace production \
            --create-namespace \
            --wait \
            --timeout 5m
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/springboot-feature-flag -n production --timeout=60s
        continue-on-error: true
        id: verify
      - name: Verify HPA
        run: |
          kubectl get hpa springboot-feature-flag-hpa -n production -o yaml || true
      - name: Verify HPA Custom
        run: |
          kubectl get hpa springboot-feature-flag-hpa-custom -n production -o yaml || true
      - name: Verify VPA
        run: |
          kubectl get vpa springboot-feature-flag-vpa -n production -o yaml || true
      - name: Rollback on failure
        if: steps.verify.outcome == 'failure'
        run: |
          echo "Deployment failed, rolling back..."
          helm rollback springboot-feature-flag 0 --namespace production
        continue-on-error: true
      - name: Health check
        run: |
          echo "Deployment completed"

  chaos-tests:
    needs: deploy-to-kubernetes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      - name: Set up Kubernetes config
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Apply Chaos Mesh experiments
        run: |
          kubectl apply -f helm-chart/springboot-feature-flag/templates/chaos/chaosmesh.yaml -n production || true
      - name: Wait for chaos experiments
        run: |
          sleep 90
      - name: Check chaos experiments status
        run: |
          kubectl get podchaos -n production -o wide || true
          kubectl get networkchaos -n production -o wide || true

  generate-report:
    needs: chaos-tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Generate HTML Dashboard
        run: |
          # Create resilience report data
          kubectl get pods -n production -o wide > pods-status.txt || true
        shell: bash
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resilience-report
          path: |
            resilience-report.md
            resilience-dashboard.html

  notify-slack:
    needs: generate-report
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: resilience-report
          path: ./reports
      - name: Send Slack notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"📊 Resilience Report generado - Spring Boot Feature Flag\n- PDF: resilience-dashboard.pdf\n- HTML: resilience-dashboard.html"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-teams:
    needs: generate-report
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: resilience-report
          path: ./reports
      - name: Send Teams notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"title":"Resilience Report","text":"Reporte de resiliencia generado automáticamente para springboot-feature-flag. Failover y chaos tests completados."}' \
            ${{ secrets.TEAMS_WEBHOOK_URL }}
