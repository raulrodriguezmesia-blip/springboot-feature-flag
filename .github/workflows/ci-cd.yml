name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test with Maven
        run: mvn -B clean verify

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${DOCKER_USERNAME:-default}/feature-flag-service:latest .

      - name: Push Docker image
        run: |
          docker push ${DOCKER_USERNAME:-default}/feature-flag-service:latest

  release-docker:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B package -DskipTests -Drevision=$(date +%Y.%m.%d-%H%M%S)

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract git commit SHA
        id: git_sha
        run: |
          echo "git_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image with commit tag
        run: |
          docker build -t ${DOCKER_USERNAME:-default}/feature-flag-service:${{ steps.git_sha.outputs.git_sha }} .
          docker tag ${DOCKER_USERNAME:-default}/feature-flag-service:${{ steps.git_sha.outputs.git_sha }} ${DOCKER_USERNAME:-default}/feature-flag-service:latest

      - name: Push Docker image
        run: |
          docker push ${DOCKER_USERNAME:-default}/feature-flag-service:${{ steps.git_sha.outputs.git_sha }}
          docker push ${DOCKER_USERNAME:-default}/feature-flag-service:latest

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.git_sha.outputs.git_sha }}
          release_name: Release ${{ steps.git_sha.outputs.git_sha }}
          draft: false
          prerelease: false