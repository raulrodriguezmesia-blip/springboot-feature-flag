# CI - Spring Boot Feature Flag
# Pipeline de CI/CD con Maven y Docker Hub
name: CI - Spring Boot Feature Flag

# Eventos que disparan el workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Jobs del pipeline
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Configurar Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # 3. Cache de dependencias Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      # 4. Compilar el proyecto
      - name: Build with Maven
        run: mvn clean install -DskipTests
      
      # 5. Ejecutar tests
      - name: Run tests
        run: mvn test
      
      # 6. Subir artefacto JAR generado
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: springboot-feature-flag
          path: target/*.jar
      
      # 7. Subir resultados de tests (JUnit XML)
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/*.xml
          if-no-files-found: warn

  docker-build-and-push:
    # Depende del job anterior
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      # 1. Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Configurar Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      
      # 3. Login en Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # 4. Preparar tags
      - name: Set image tags
        id: meta
        run: |
          IMAGE_NAME=raulrodriguezmesia/springboot-feature-flag
          COMMIT_SHA=${GITHUB_SHA::8}
          echo "image=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tag=${COMMIT_SHA}" >> $GITHUB_OUTPUT
      
      # 5. Construir y push imagen Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
