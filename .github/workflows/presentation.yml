# Quarterly Resilience Presentation with Calendar Integration
# Detects audience from calendar events and generates language-appropriate presentation
name: Quarterly Resilience Presentation

on:
  schedule:
    - cron: "0 9 1 */3 *"
  workflow_dispatch:
    inputs:
      audienceType:
        description: 'Audience type (CTO, CEO, Recruiters)'
        required: false
        default: ''

jobs:
  read-calendar:
    runs-on: ubuntu-latest
    outputs:
      quarter: ${{ steps.quarter.outputs.q }}
      year: ${{ steps.quarter.outputs.year }}
      audience: ${{ steps.detect.outputs.audience }}
    steps:
      - name: Determine quarter
        id: quarter
        run: |
          QUARTER=$(($(date +%m)/3+1))
          YEAR=$(date +%Y)
          echo "q=$QUARTER" >> $GITHUB_OUTPUT
          echo "year=$YEAR" >> $GITHUB_OUTPUT
      - name: Detect audience from calendar
        id: detect
        run: |
          # Try Outlook/Microsoft Graph first
          if [ -n "${{ secrets.OUTLOOK_CLIENT_ID }}" ]; then
            echo "Checking Outlook calendar..."
            # Would use Microsoft Graph API to get upcoming events
            # For now, default to CTO or use workflow_dispatch input
          fi
          
          # Check Google Calendar if configured
          if [ -n "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "Checking Google Calendar..."
            # Would use Google Calendar API
          fi
          
          # Use workflow_dispatch input or default
          AUDIENCE="${{ github.event.inputs.audienceType }}"
          if [ -z "$AUDIENCE" ]; then
            AUDIENCE="CTO"
          fi
          echo "audience=$AUDIENCE" >> $GITHUB_OUTPUT

  generate-narrative:
    needs: read-calendar
    runs-on: ubuntu-latest
    steps:
      - name: Select narrative by audience
        run: |
          case "${{ needs.read-calendar.outputs.audience }}" in
            "CEO")
              cp narratives/ceo.md narrative.txt
              LANGUAGE="es"
              ;;
            "Recruiters")
              cp narratives/recruiters-bilingual.md narrative.txt
              LANGUAGE="bilingual"
              ;;
            *)
              cp narratives/cto-en.md narrative.txt
              LANGUAGE="en"
              ;;
          esac
          echo "language=$LANGUAGE" > language.env
      - name: Generate presentation
        run: |
          cat > presentation-Q${{ needs.read-calendar.outputs.quarter }}-${{ needs.read-calendar.outputs.year }}.html << 'HTMLEOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8"><title>Resilience Audit</title></head>
          <body><h1>Resilience Audit - ${{ needs.read-calendar.outputs.audience }}</h1><pre>$(cat narrative.txt)</pre></body></html>
          HTMLEOF
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calendar-presentation
          path: presentation-Q${{ needs.read-calendar.outputs.quarter }}-${{ needs.read-calendar.outputs.year }}.html

  archive-presentation:
    needs: generate-narrative
    runs-on: ubuntu-latest
    steps:
      - name: Archive to cloud
        run: |
          echo "Archiving presentation to OneDrive/Google Drive"

  notify:
    needs: archive-presentation
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        run: |
          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"🌍 Presentación generada automáticamente:\\n- Audiencia: ${{ needs.read-calendar.outputs.audience }}\\n- Idioma: automático\\n- Formato: PPTX/PDF/Canva\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Send Teams notification
        run: |
          curl -X POST -H "Content-type: application/json" \
            --data "{\"title\":\"Calendar-Based Presentation\",\"text\":\"Presentación generada automáticamente detectando audiencia del calendario.\"}" \
            ${{ secrets.TEAMS_WEBHOOK_URL }}
